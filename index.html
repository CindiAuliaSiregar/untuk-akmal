<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You</title>
    
    <style>
        /* --- STYLING DASAR --- */
        body {
            /* Menghapus spasi default di pinggir layar */
            margin: 0;
            /* Latar belakang hitam pekat */
            background-color: #000;
            /* Menggunakan Flexbox untuk memposisikan elemen di tengah layar */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* Tinggi layar 100% dari perangkat */
            height: 100vh;
            /* Menyembunyikan elemen yang meluber keluar layar (mencegah scroll) */
            overflow: hidden;
            /* Memberikan efek kedalaman/perspektif 3D pada halaman */
            perspective: 1000px;
            /* Mengatur jenis font dasar */
            font-family: 'Arial', sans-serif;
        }

        /* --- STYLING WADAH HATI --- */
        .container {
            /* Posisinya relatif terhadap dokumen */
            position: relative;
            /* Memastikan anak elemen (partikel teks) mempertahankan efek 3D mereka */
            transform-style: preserve-3d;
            /* Z-index 10 agar berada di atas kembang api, tapi di bawah tombol */
            z-index: 10;
        }

        /* --- STYLING PARTIKEL TEKS --- */
        .ui_love_word {
            /* Warna font pink */
            color: #ea80b0;
            /* Posisinya absolut agar bisa ditumpuk dan dimanipulasi posisinya */
            position: absolute;
            /* Memberikan efek bayangan menyala (glow) warna pink muda */
            text-shadow: 0 0 10px #ffb3d9;
            /* Mencegah teks terpotong ke baris baru */
            white-space: nowrap;
            opacity: 1; 
            /* Transisi halus saat ukuran font berubah (misal saat diputar dari landscape ke portrait) */
            transition: font-size 0.5s ease;
        }

        /* --- STYLING AREA TOMBOL --- */
        .btn-container {
            /* Posisinya absolut di bagian bawah layar */
            position: absolute;
            bottom: 10%; /* Jarak 10% dari bawah */
            /* Z-index 20 agar selalu ada di lapisan teratas (selalu bisa diklik) */
            z-index: 20;
            /* Lebar penuh agar tombol bisa dipusatkan */
            width: 100%;
            display: flex;
            justify-content: center;
        }

        button {
            /* Tombol tembus pandang */
            background-color: transparent;
            /* Teks warna pink */
            color: #ea80b0;
            /* Garis pinggir warna pink */
            border: 2px solid #ea80b0;
            /* Jarak teks ke garis pinggir (atas-bawah 12px, kiri-kanan 24px) */
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            /* Membuat pinggiran tombol bulat */
            border-radius: 30px;
            /* Ubah kursor jadi tangan saat disorot */
            cursor: pointer;
            /* Bayangan bercahaya warna pink */
            box-shadow: 0 0 15px rgba(234, 128, 176, 0.3);
            /* Transisi halus untuk semua perubahan (saat di-hover) */
            transition: all 0.3s ease;
            /* Memberi efek blur pada background yang ada di balik tombol */
            backdrop-filter: blur(5px);
        }

        /* Efek saat tombol disorot (hover) */
        button:hover {
            /* Warna tombol jadi pink penuh */
            background-color: #ea80b0;
            /* Teks jadi hitam */
            color: #000;
            /* Bayangan makin terang */
            box-shadow: 0 0 20px #ffb3d9;
            /* Tombol sedikit membesar */
            transform: scale(1.05);
        }

        /* --- OPTIMALISASI MOBILE (MEDIA QUERY) --- */
        /* Perintah ini hanya dieksekusi JIKA lebar layar kurang dari 600px (layar HP) */
        @media (max-width: 600px) {
            .btn-container {
                /* Tombol dinaikkan agar tidak terhalang menu navigasi bawah di HP modern */
                bottom: 15%; 
            }
            button {
                /* Ukuran tombol dikecilkan agar pas di HP */
                font-size: 0.85rem;
                padding: 10px 20px;
            }
        }

        /* --- STYLING WADAH KEMBANG API --- */
        #fireworks-container {
            /* Posisinya tetap di pojok kiri atas, mengambil seluruh layar */
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            /* Berada di lapisan paling belakang */
            z-index: 1; 
            /* Klik tidak akan berefek pada wadah ini (agar tidak memblokir tombol) */
            pointer-events: none; 
        }

        /* --- STYLING PERCIKAN KEMBANG API --- */
        .spark {
            position: absolute;
            /* Ukuran butiran sangat kecil */
            width: 4px; height: 4px;
            border-radius: 50%; /* Bulat sempurna */
            /* Panggil animasi 'explode' berdurasi 1.5 detik, dan biarkan di kondisi terakhir (forwards) */
            animation: explode 1.5s ease-out forwards;
        }

        /* Keyframes Animasi Ledakan */
        @keyframes explode {
            /* Awal ledakan: skala normal (1), posisi (0,0), terlihat jelas (opacity 1) */
            0% { transform: scale(1) translate(0,0); opacity: 1; }
            /* Akhir ledakan: skala mengecil jadi 0, bergerak ke arah vektor dx dan dy, dan menghilang (opacity 0) */
            100% { transform: scale(0) translate(var(--dx), var(--dy)); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="fireworks-container"></div>
    
    <div class="container" id="heart-container"></div>

    <div class="btn-container">
        <button id="toggleBtn">✨ Sayang, Klik ini yaa ✨</button>
    </div>

    <script>
        // Tangkap elemen-elemen HTML dan simpan dalam variabel
        const container = document.getElementById('heart-container');
        const toggleBtn = document.getElementById('toggleBtn');
        const fwContainer = document.getElementById('fireworks-container');

        // Status: false berarti tulisan "I Love You", true berarti tulisan panjang
        let isName = false;
        // Definisi Teks
        const text1 = "I Love You";
        const text2 = "Muhammad Akmal Fadilah NGESELIN WLEE!!!";
        
        // Array untuk menyimpan data setiap partikel (elemen HTML dan parameternya)
        let particlesData = []; 
        // Variabel untuk mengontrol perulangan animasi
        let animationFrameId;

        // FUNGSI: Membuat struktur HTML partikel hati
        function createHeart() {
            // Bersihkan wadah agar tidak tumpang tindih dengan yang lama
            container.innerHTML = ''; 
            // Kosongkan memori partikel
            particlesData = [];
            
            // DETEKSI MOBILE: Cek apakah lebar layar kurang dari 600px
            const isMobile = window.innerWidth < 600;
            // Jika di HP, jumlah partikel dikurangi jadi 60 agar tidak berat. Jika di Laptop, 80 partikel.
            const numParticles = isMobile ? 60 : 80; 

            // Ulangi pembuatan teks sebanyak jumlah partikel yang ditentukan
            for (let i = 0; i < numParticles; i++) {
                // Hitung sudut penempatan awal untuk setiap teks agar membentuk lingkaran penuh
                let t = Math.PI * 2 * (i / numParticles);
                // Beri nilai kedalaman (sumbu Z) secara acak untuk efek 3D (maju/mundur)
                let z = (Math.random() - 0.5) * 40;

                // Buat tag <div> baru untuk satu kalimat
                let el = document.createElement('div');
                el.className = 'ui_love_word';
                // Masukkan teks sesuai status saat ini
                el.innerText = isName ? text2 : text1;
                
                // SKALA FONT DINAMIS
                if (isMobile) {
                    // Jika layar HP: teks panjang ukurannya 0.45rem, teks pendek 0.85rem
                    el.style.fontSize = isName ? "0.45rem" : "0.85rem";
                } else {
                    // Jika layar Laptop: teks panjang ukurannya 0.55rem, teks pendek 1.1rem
                    el.style.fontSize = isName ? "0.55rem" : "1.1rem";
                }

                // Masukkan <div> kalimat tersebut ke dalam wadah HTML
                container.appendChild(el);
                // Simpan elemen HTML, nilai sudut (t), dan kedalaman (z) ke dalam memori
                particlesData.push({ el, t, z });
            }
        }

        // FUNGSI: Menganimasi/menggerakkan partikel teks mengikuti jalur hati
        function animateHeart() {
            // Cek lagi apakah layar HP
            const isMobile = window.innerWidth < 600;
            
            // Loop melalui setiap partikel yang tersimpan
            particlesData.forEach(p => {
                // Tambahkan nilai t (sudut) setiap frame. Ini yang membuat teks terlihat mengalir/berjalan
                p.t += 0.002; 
                
                // RUMUS MATEMATIKA PARAMETRIK HATI
                // Hitung koordinat sumbu X
                let x = 16 * Math.pow(Math.sin(p.t), 3);
                // Hitung koordinat sumbu Y
                let y = -(13 * Math.cos(p.t) - 5 * Math.cos(2*p.t) - 2 * Math.cos(3*p.t) - Math.cos(4*p.t));

                // SKALA UKURAN HATI DINAMIS
                // Jika di HP, perbesar rumus sebanyak 11x (agar tidak meluber). Jika di Laptop, perbesar 20x.
                let scale = isMobile ? 11 : 20; 
                x *= scale;
                y *= scale;

                // Terapkan koordinat yang sudah dihitung (ditambah koordinat Z dari memori) ke elemen HTML di layar
                p.el.style.transform = `translate(-50%, -50%) translate3d(${x}px, ${y}px, ${p.z}px)`;
            });
            
            // Perintahkan browser untuk terus memanggil fungsi ini (membuat animasi berkelanjutan)
            animationFrameId = requestAnimationFrame(animateHeart);
        }

        // FUNGSI: Menembakkan kembang api
        function shootFirework() {
            // Tentukan koordinat tengah ledakan secara acak di area layar
            let cx = Math.random() * window.innerWidth;
            let cy = Math.random() * window.innerHeight;
            
            // Daftar warna kembang api
            const colors = ['#ffb3d9', '#ea80b0', '#ffffff', '#ff99cc'];
            // Pilih satu warna acak
            let color = colors[Math.floor(Math.random() * colors.length)];

            // Buat 40 percikan untuk satu ledakan
            for(let i = 0; i < 40; i++) {
                // Buat <div> untuk satu percikan
                let spark = document.createElement('div');
                spark.className = 'spark';
                spark.style.background = color; // Terapkan warna
                spark.style.boxShadow = `0 0 10px ${color}, 0 0 20px #fff`; // Terapkan bayangan glow
                
                // Tentukan arah lontaran percikan secara acak (sudut 360 derajat)
                let angle = Math.random() * Math.PI * 2;
                // Tentukan jauhnya lontaran secara acak
                let distance = Math.random() * 150 + 50; 
                
                // Posisikan percikan tepat di titik pusat ledakan
                spark.style.left = cx + 'px';
                spark.style.top = cy + 'px';
                // Hitung vektor pergerakan sumbu X dan Y berdasarkan sudut dan jarak lontaran
                spark.style.setProperty('--dx', Math.cos(angle) * distance + 'px');
                spark.style.setProperty('--dy', Math.sin(angle) * distance + 'px');
                
                // Masukkan percikan ke layar
                fwContainer.appendChild(spark);
                
                // Hapus percikan dari layar setelah animasi selesai (1.5 detik) agar tidak membebani memori HP
                setTimeout(() => spark.remove(), 1500);
            }
        }

        // --- INISIALISASI AWAL ---
        // Panggil fungsi untuk mencetak partikel awal
        createHeart();
        // Mulai animasi pergerakan
        animateHeart();
        
        // Panggil fungsi kembang api secara berkala (setiap 0.8 detik atau 800ms)
        setInterval(shootFirework, 800);

        // --- PENDENGAR ROTASI LAYAR ---
        // Listener ini dipanggil otomatis jika pengguna memutar HP atau merubah ukuran jendela browser
        window.addEventListener('resize', () => {
            // Hentikan animasi sementara
            cancelAnimationFrame(animationFrameId);
            // Hitung dan buat ulang partikel berdasarkan ukuran layar yang baru
            createHeart();
            // Lanjutkan animasi
            animateHeart();
        });

        // --- PENDENGAR KLIK TOMBOL ---
        // Dijalankan saat tombol ditekan
        toggleBtn.addEventListener('click', () => {
            // Ubah status (dari teks 1 ke teks 2, atau sebaliknya)
            isName = !isName;
            
            // Hentikan animasi agar tidak bentrok
            cancelAnimationFrame(animationFrameId);
            
            // Buat ulang partikel dengan teks yang baru dipilih
            createHeart();
            // Lanjutkan animasi pergerakan
            animateHeart();
            
            // Ganti tulisan di dalam tombol sesuai status
            toggleBtn.innerText = isName ? "GA JADI! Ngeselin Pokoknya!!!" : "✨ I Miss You ✨";
        });
    </script>
</body>
</html>
